# ============================================================================
# DOCKER COMPOSE CONFIGURATION (POSTGRESQL-FIRST)
# ============================================================================
# CricGeo backend with optional local PostgreSQL and pgAdmin services.
# Default DATABASE_URL points to external PostgreSQL using .env values.
# ============================================================================

services:
  # ==========================================================================
  # FASTAPI BACKEND SERVICE
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: cricgeo_backend
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://cric_geo:Shuvo231@132.145.103.103:5432/cric_geo_db}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@cricgeo.app}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-CricGeo}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      APP_NAME: ${APP_NAME:-CricGeo Backend}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-False}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      WORKERS: ${WORKERS:-4}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - backend_network

  # ==========================================================================
  # OPTIONAL: LOCAL POSTGRESQL SERVICE (DEV ONLY)
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: cricgeo_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME:-cric_geo_db}
      POSTGRES_USER: ${DB_USER:-cric_geo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Shuvo231}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cric_geo} -d ${DB_NAME:-cric_geo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - backend_network

    profiles:
      - local-db

  # ==========================================================================
  # OPTIONAL: PGADMIN (DATABASE MANAGEMENT)
  # ==========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cricgeo_pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@cricgeo.app}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}

    ports:
      - "8080:80"

    depends_on:
      - postgres

    networks:
      - backend_network

    profiles:
      - tools

# ==========================================================================
# NETWORKS
# ==========================================================================
networks:
  backend_network:
    driver: bridge

# ==========================================================================
# VOLUMES
# ==========================================================================
volumes:
  postgres_data:
    driver: local
