# ============================================================================
# DOCKER COMPOSE CONFIGURATION
# ============================================================================
# Complete stack deployment for FastAPI backend with MySQL database
# Includes backend service, MySQL database, and optional services
# ============================================================================

services:
  # ==========================================================================
  # MYSQL DATABASE SERVICE
  # ==========================================================================
  mysql:
    image: mysql:8.0
    container_name: fastapi_mysql
    restart: unless-stopped
    
    # Environment variables for MySQL
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-23570111}
      MYSQL_DATABASE: ${DB_NAME:-saas_db}
      # Note: MYSQL_USER cannot be 'root'. Root user is configured via MYSQL_ROOT_PASSWORD only.
      # Uncomment below to create an additional non-root user:
      # MYSQL_USER: ${DB_USER:-appuser}
      # MYSQL_PASSWORD: ${DB_PASSWORD:-23570111}
    
    # Port mapping (host:container)
    # Changed to 3307 to avoid conflict with local MySQL on 3306
    ports:
      - "3307:3306"
    
    # Persistent volume for database data
    volumes:
      - mysql_data:/var/lib/mysql
      # Optional: Custom MySQL configuration
      # - ./mysql.cnf:/etc/mysql/conf.d/custom.cnf
    
    # Health check for MySQL
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-23570111}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    # Network
    networks:
      - backend_network

  # ==========================================================================
  # FASTAPI BACKEND SERVICE
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: fastapi_backend
    restart: unless-stopped
    
    # Port mapping (host:container)
    ports:
      - "8000:8000"
    
    # Environment variables (override .env file)
    environment:
      # Database configuration
      DATABASE_URL: mysql+aiomysql://${DB_USER:-root}:${DB_PASSWORD:-23570111}@mysql:3306/${DB_NAME:-saas_db}
      
      # JWT configuration
      JWT_SECRET: ${JWT_SECRET:-mL048oiv5fDgyTw-344kU1MqZcHuWJ09YiLLC33JGEU}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
      
      # Email configuration
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-chatbot-pro@gmail.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ChatBot-Pro}
      
      # Google OAuth2 configuration
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      
      # Application configuration
      DEBUG: ${DEBUG:-False}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      
      # Gunicorn workers (adjust based on CPU cores)
      WORKERS: ${WORKERS:-4}
    
    # Dependencies - wait for MySQL to be healthy
    depends_on:
      mysql:
        condition: service_healthy
    
    # Optional: Mount volumes for development
    # volumes:
    #   - ./app:/app/app  # Live code reload
    #   - ./migrations:/app/migrations  # Database migrations
    
    # Health check for backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Network
    networks:
      - backend_network
    
    # Command override for development (with auto-reload)
    # Uncomment for development mode:
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ==========================================================================
  # OPTIONAL: PHPMYADMIN (Database Management)
  # ==========================================================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: fastapi_phpmyadmin
    restart: unless-stopped
    
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-root}
      PMA_PASSWORD: ${DB_PASSWORD:-23570111}
    
    ports:
      - "8080:80"
    
    depends_on:
      - mysql
    
    networks:
      - backend_network
    
    # Uncomment to enable phpMyAdmin
    profiles:
      - tools

  # ==========================================================================
  # OPTIONAL: REDIS (Caching/Session Storage)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: fastapi_redis
    restart: unless-stopped
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - backend_network
    
    # Uncomment to enable Redis
    profiles:
      - cache

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  backend_network:
    driver: bridge

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
#
# START ALL SERVICES:
# docker-compose up -d
#
# START WITH OPTIONAL SERVICES:
# docker-compose --profile tools --profile cache up -d
#
# VIEW LOGS:
# docker-compose logs -f
# docker-compose logs -f backend
# docker-compose logs -f mysql
#
# STOP ALL SERVICES:
# docker-compose down
#
# STOP AND REMOVE VOLUMES (WARNING: Deletes data):
# docker-compose down -v
#
# REBUILD BACKEND:
# docker-compose up -d --build backend
#
# RUN DATABASE MIGRATIONS:
# docker-compose exec backend alembic upgrade head
#
# ACCESS BACKEND SHELL:
# docker-compose exec backend /bin/bash
#
# ACCESS MYSQL CLI:
# docker-compose exec mysql mysql -u root -p
#
# SCALE BACKEND (multiple workers):
# docker-compose up -d --scale backend=3
#
# CHECK SERVICE HEALTH:
# docker-compose ps
#
# SERVICES:
# - Backend API:    http://localhost:8000
# - API Docs:       http://localhost:8000/docs
# - phpMyAdmin:     http://localhost:8080 (with --profile tools)
# - MySQL:          localhost:3306
# - Redis:          localhost:6379 (with --profile cache)
#
# ============================================================================
